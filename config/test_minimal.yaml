# ============================================================
# 最小化测试配置 - 单卡 A800 80GB
# ============================================================

pdf_path: TODO  # 由 main.py 自动填充
save_path: TODO  # 由 main.py 自动填充

# --- LLM: 通过 vLLM 提供 OpenAI 兼容 API ---
llm:
  model_name: /root/autodl-fs/models/Qwen3-8B
  api_key: empty
  api_base: http://localhost:8003/v1
  backend: openai
  max_tokens: 30000
  temperature: 0.1
  frequency_penalty: 0.0
  presence_penalty: 0.0
  max_workers: 4

# --- VLM: 启用本地 Qwen3-VL（无需额外服务）---
vlm:
  backend: gpt
  model_name: /root/autodl-fs/models/Qwen3-VL-8B-Instruct
  api_key: empty
  api_base: http://localhost:8004/v1
  temperature: 0.1
  max_tokens: 32768

# --- MinerU PDF 解析: 使用 pipeline 模式（无需外部 VLM 服务）---
mineru:
  backend: pipeline
  method: auto
  server_url: http://localhost:30000
  lang: ch

# --- 文档树配置 ---
tree:
  node_keywords: True
  node_summary: True
  use_vlm: True

# --- 知识图谱配置 ---
graph:
  extractor_type: "llm"
  # local_model_name: "en_core_web_sm"
  image_description_force: True
  max_gleaning: 0
  refine_type: "advanced"
  use_remote_kg_service: false
  kg_service_url: "http://localhost:8080"
  embedding_config:
    model_name: /root/autodl-fs/models/Qwen3-Embedding-0.6B
    backend: local
    max_length: 30000
    device: "cuda:0"
  reranker_config:
    model_name: /root/autodl-fs/models/Qwen3-Reranker-0.6B
    max_length: 30000
    device: "cuda:0"
    backend: local

# --- 向量数据库配置 ---
vdb:
  mm_embedding: True
  vdb_dir_name: "Tree_vdb"
  collection_name: "TreeVDB"
  embedding_config:
    model_name: /root/autodl-fs/models/gme-Qwen2-VL-2B-Instruct
    device: "cuda:0"

rag_force_reprocess: True

# --- RAG 配置 ---
rag:
  strategy: gbc
  varient: standard
  topk: 10
  sim_threshold: 0.3
  select_depth: 2
  max_retry: 2
  reranker_config:
    model_name: /root/autodl-fs/models/Qwen3-Reranker-0.6B
    max_length: 30000
    device: "cuda:0"
    backend: local
  mm_reranker_config:
    model_name: /root/autodl-fs/models/gme-Qwen2-VL-2B-Instruct
    device: "cuda:0"
